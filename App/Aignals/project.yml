name: Aignals
options:
  bundleIdPrefix: com.aignals
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  # Pin to the Xcode 15.x project format. Newer XcodeGen defaults to
  # xcode16_0 (objectVersion 77), which Xcode 15.4 cannot open.
  projectFormat: xcode15_3

packages:
  AignalsCore:
    path: ../../

targets:
  Aignals:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - "Assets.xcassets"
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.4.0"
        CFBundleVersion: "1"
    dependencies:
      - package: AignalsCore
        product: AignalsCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aignals.Aignals
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: "Embed aignals-hook"
        script: |
          set -euo pipefail
          SRC="${SRCROOT}/../../CLI/aignals-hook/aignals-hook"
          DST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/aignals-hook"
          mkdir -p "$(dirname "$DST")"
          cp "$SRC" "$DST"
          chmod +x "$DST"
