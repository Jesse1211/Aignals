<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- C: A single bold dot with a soft "active" pulse ring — minimal, app-like. Green = your turn. -->
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2b22"/>
      <stop offset="1" stop-color="#11160f"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#32d74b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#32d74b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bgC)"/>
  <circle cx="256" cy="256" r="150" fill="url(#glowC)"/>
  <circle cx="256" cy="256" r="96" fill="#32d74b"/>
  <circle cx="256" cy="256" r="96" fill="none" stroke="#9bf0ad" stroke-opacity="0.5" stroke-width="6"/>
</svg>
