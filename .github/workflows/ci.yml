name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    name: test (Xcode 15.4)
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Print toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-xcode15.4-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode15.4-

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install bats + jq + xcodegen
        run: brew install bats-core jq xcodegen

      - name: Swift tests (unit + integration + E2E)
        run: swift test --parallel

      - name: bats tests (hook CLI)
        run: |
          if compgen -G "Tests/HookTests/*.bats" > /dev/null; then
            bats Tests/HookTests
          else
            echo "::notice::No .bats files in Tests/HookTests yet — skipping (Phase 6)."
          fi

      - name: Generate Xcode project
        run: (cd App/Aignals && xcodegen generate)

      - name: Build the app
        run: |
          xcodebuild \
            -project App/Aignals/Aignals.xcodeproj \
            -scheme Aignals \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aignals-Debug-app
          path: build/Build/Products/Debug/Aignals.app
          if-no-files-found: error
          retention-days: 14
