name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v, e.g. 0.1.0)'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building Aignals v$V"

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: (cd App/Aignals && xcodegen generate)

      - name: Build Release
        run: |
          xcodebuild \
            -project App/Aignals/Aignals.xcodeproj \
            -scheme Aignals \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            MARKETING_VERSION=${{ steps.ver.outputs.version }} \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Self-sign
        run: |
          APP="./build/Build/Products/Release/Aignals.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose=2 "$APP"

      - name: Package zip + dmg
        run: |
          V="${{ steps.ver.outputs.version }}"
          APP="./build/Build/Products/Release/Aignals.app"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP" "dist/Aignals-$V.zip"
          hdiutil create \
            -volname "Aignals $V" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "dist/Aignals-$V.dmg"
          shasum -a 256 dist/Aignals-$V.zip dist/Aignals-$V.dmg \
            > dist/SHA256SUMS-$V.txt
          ls -lh dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aignals-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Aignals-*.zip
            dist/Aignals-*.dmg
            dist/SHA256SUMS-*.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Auto-update the Homebrew tap (Jesse1211/homebrew-aignals) so
      # `brew install --cask aignals` tracks the new release with no manual
      # sha256/version edit. Requires a repo secret TAP_PUSH_TOKEN: a GitHub PAT
      # with push access to homebrew-aignals (fine-grained: Contents R&W on that
      # repo; or a classic token with `repo`). When the secret is absent the
      # script no-ops, so the release still succeeds (update the tap by hand).
      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_PUSH_TOKEN:-}" ]; then
            echo "TAP_PUSH_TOKEN secret not set — skipping tap update (update homebrew-aignals by hand)."
            exit 0
          fi
          V="${{ steps.ver.outputs.version }}"
          DMG_SHA="$(shasum -a 256 "dist/Aignals-$V.dmg" | awk '{print $1}')"
          echo "dmg sha256 = $DMG_SHA"

          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/Jesse1211/homebrew-aignals.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/aignals.rb <<RUBY
          cask "aignals" do
            version "$V"
            sha256 "$DMG_SHA"

            url "https://github.com/Jesse1211/Aignals/releases/download/v#{version}/Aignals-#{version}.dmg"
            name "Aignals"
            desc "Menu bar indicator for AI coding agent activity"
            homepage "https://github.com/Jesse1211/Aignals"

            app "Aignals.app"

            zap trash: [
              "~/.aignals",
              "~/Library/Preferences/com.aignals.Aignals.plist",
            ]
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/aignals.rb; then
            echo "Cask already up to date; nothing to push."
          else
            git add Casks/aignals.rb
            git commit -m "aignals $V (automated from release.yml)"
            git push origin HEAD:main
            echo "Pushed aignals $V to the tap."
          fi
